# Tự động tải feed voph.cz mỗi đêm và cập nhật products.json
name: Aktualizace feedu
on:
  schedule:
    - cron: '30 0 * * *' # 2:30 giờ Séc (mùa hè CEST)
    - cron: '30 1 * * *' # 2:30 giờ Séc (mùa đông CET) — chạy 2 lần không sao
  workflow_dispatch: {} # cho phép bấm "Run workflow" bằng tay
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Tải feed
        run: node scripts/update-feed.mjs
      - name: Commit nếu có thay đổi
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add products.json
          git diff --cached --quiet || git commit -m "Aktualizace feedu $(date -u +'%Y-%m-%d')"
          git push
